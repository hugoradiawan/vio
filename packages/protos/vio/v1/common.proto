// Vio Common Types
//
// This file defines shared types used across all Vio services including
// transforms, visual styles (fills, strokes, gradients), pagination,
// and timestamps.
//
// These types mirror the data structures used in the Flutter client
// (packages/core/lib/src/models/) and PostgreSQL database schema
// (backend/src/db/schema/).
syntax = "proto3";

package vio.v1;

// =============================================================================
// Transform Matrix
// =============================================================================

// 6-parameter affine transformation matrix for 2D graphics.
//
// Represents the matrix:
//   | a  c  e |
//   | b  d  f |
//   | 0  0  1 |
//
// This is used for positioning, rotating, scaling, and skewing shapes.
// The identity matrix (no transformation) has a=1, b=0, c=0, d=1, e=0, f=0.
//
// See: packages/core/lib/src/math/matrix2d.dart for Flutter implementation.
message Transform {
  // Horizontal scaling factor. Default: 1.0 (no scale).
  double a = 1;
  // Vertical skew factor. Default: 0.0 (no skew).
  double b = 2;
  // Horizontal skew factor. Default: 0.0 (no skew).
  double c = 3;
  // Vertical scaling factor. Default: 1.0 (no scale).
  double d = 4;
  // Horizontal translation (X offset) in canvas coordinates.
  double e = 5;
  // Vertical translation (Y offset) in canvas coordinates.
  double f = 6;
}

// =============================================================================
// Fill Styles
// =============================================================================

// Fill style applied to shape interiors.
//
// Shapes can have multiple fills stacked on top of each other.
// Each fill can be a solid color or a gradient.
message Fill {
  // ARGB color value as a 32-bit unsigned integer (0xAARRGGBB).
  // Example: 0xFF3B82F6 = opaque blue (#3B82F6).
  uint32 color = 1;
  // Fill opacity from 0.0 (fully transparent) to 1.0 (fully opaque).
  double opacity = 2;
  // Whether this fill is hidden (not rendered).
  bool hidden = 3;
  // Optional gradient fill. When present, overrides solid color.
  optional Gradient gradient = 4;
  // Optional image fill for texture/pattern fills.
  optional FillImage fill_image = 5;
}

// Image fill for texture or pattern fills.
message FillImage {
  // Reference ID to the image asset.
  string id = 1;
  // Image width in pixels.
  optional double width = 2;
  // Image height in pixels.
  optional double height = 3;
  // MIME type of the image (e.g., "image/png").
  optional string mtype = 4;
}

// Gradient fill definition with multiple color stops.
//
// Gradients interpolate colors along a line (linear) or from a center
// point outward (radial).
message Gradient {
  // Type of gradient interpolation.
  enum Type {
    // Default/unspecified - should not be used.
    TYPE_UNSPECIFIED = 0;
    // Linear gradient: colors transition along a straight line.
    TYPE_LINEAR = 1;
    // Radial gradient: colors transition outward from a center point.
    TYPE_RADIAL = 2;
  }
  // Gradient type (linear or radial).
  Type type = 1;
  // Color stops defining the gradient. Must have at least 2 stops.
  // Stops should be ordered by offset from 0.0 to 1.0.
  repeated GradientStop stops = 2;
  // Start point X coordinate (0.0 to 1.0 relative to shape bounds).
  double start_x = 3;
  // Start point Y coordinate (0.0 to 1.0 relative to shape bounds).
  double start_y = 4;
  // End point X coordinate (0.0 to 1.0 relative to shape bounds).
  double end_x = 5;
  // End point Y coordinate (0.0 to 1.0 relative to shape bounds).
  double end_y = 6;
}

// Single color stop in a gradient.
message GradientStop {
  // ARGB color value as a 32-bit unsigned integer (0xAARRGGBB).
  uint32 color = 1;
  // Position of this stop along the gradient (0.0 = start, 1.0 = end).
  double offset = 2;
  // Opacity of this stop from 0.0 (transparent) to 1.0 (opaque).
  double opacity = 3;
}

// =============================================================================
// Stroke Styles
// =============================================================================

// Stroke style applied to shape outlines/borders.
//
// Shapes can have multiple strokes stacked (e.g., inner + outer stroke).
message Stroke {
  // ARGB color value as a 32-bit unsigned integer (0xAARRGGBB).
  uint32 color = 1;
  // Stroke width in canvas units (pixels at 100% zoom).
  double width = 2;
  // Stroke opacity from 0.0 (transparent) to 1.0 (opaque).
  double opacity = 3;
  // Whether this stroke is hidden (not rendered).
  bool hidden = 4;
  // Stroke position relative to the shape path.
  StrokeAlignment alignment = 5;
  // Line cap style for stroke endpoints.
  StrokeCap cap = 6;
  // Line join style for stroke corners.
  StrokeJoin join = 7;
}

// Stroke alignment relative to the shape's path.
enum StrokeAlignment {
  // Default/unspecified - treated as CENTER.
  STROKE_ALIGNMENT_UNSPECIFIED = 0;
  // Stroke is centered on the path (half inside, half outside).
  STROKE_ALIGNMENT_CENTER = 1;
  // Stroke is drawn entirely inside the shape bounds.
  STROKE_ALIGNMENT_INSIDE = 2;
  // Stroke is drawn entirely outside the shape bounds.
  STROKE_ALIGNMENT_OUTSIDE = 3;
}

// Line cap style for stroke line endings.
enum StrokeCap {
  // Default/unspecified - treated as BUTT.
  STROKE_CAP_UNSPECIFIED = 0;
  // Flat cap that ends exactly at the path endpoint.
  STROKE_CAP_BUTT = 1;
  // Rounded cap that extends past the endpoint by half the stroke width.
  STROKE_CAP_ROUND = 2;
  // Square cap that extends past the endpoint by half the stroke width.
  STROKE_CAP_SQUARE = 3;
}

// Line join style for stroke corners where two lines meet.
enum StrokeJoin {
  // Default/unspecified - treated as MITER.
  STROKE_JOIN_UNSPECIFIED = 0;
  // Sharp corner that extends to a point.
  STROKE_JOIN_MITER = 1;
  // Rounded corner.
  STROKE_JOIN_ROUND = 2;
  // Beveled/flat corner.
  STROKE_JOIN_BEVEL = 3;
}

// =============================================================================
// Pagination
// =============================================================================

// Pagination parameters for list operations.
//
// Used by ListProjects, ListCommits, and other list RPCs.
message PageToken {
  // Maximum number of items to return. Server may return fewer.
  // Default varies by endpoint, typically 50-100.
  int32 limit = 1;
  // Number of items to skip before starting to return results.
  // Use for pagination: page N has offset = (N-1) * limit.
  int32 offset = 2;
}

// =============================================================================
// Time & Utility Types
// =============================================================================

// Timestamp represented as milliseconds since Unix epoch (1970-01-01T00:00:00Z).
//
// Using milliseconds (not seconds or nanoseconds) for:
// - JavaScript compatibility (Date.now() returns milliseconds)
// - Sufficient precision for design tool operations
// - Simpler than google.protobuf.Timestamp for this use case
message Timestamp {
  // Milliseconds since Unix epoch (January 1, 1970 00:00:00 UTC).
  int64 millis = 1;
}

// Empty message for RPCs that don't require request data or return no data.
//
// Used for operations like DeleteProject, Logout, etc.
message Empty {}

// =============================================================================
// Merge & Conflict Types (shared by branch and pullrequest services)
// =============================================================================

// Merge strategy for combining branches.
// Reference: gitea/services/pull/merge.go
enum MergeStrategy {
  // Default/unspecified - server chooses (typically MERGE_COMMIT).
  MERGE_STRATEGY_UNSPECIFIED = 0;
  // Create a merge commit with all changes.
  // Preserves full history of both branches.
  MERGE_STRATEGY_MERGE_COMMIT = 1;
  // Squash all source commits into a single commit on target.
  // Creates cleaner history but loses individual commit info.
  MERGE_STRATEGY_SQUASH = 2;
  // Fast-forward target to source head (only if target is ancestor).
  // No merge commit created. Fails if branches have diverged.
  MERGE_STRATEGY_FAST_FORWARD = 3;
}

// A conflict between branches on a specific shape.
//
// Conflicts occur when the same shape property was modified in both
// branches since their common ancestor.
message ShapeConflict {
  // ID of the shape with conflicting changes.
  string shape_id = 1;
  // Name of the shape for display purposes.
  string shape_name = 2;
  // Type of the shape (rectangle, ellipse, etc.).
  string shape_type = 3;
  // Properties that conflict (both branches modified).
  repeated PropertyConflict property_conflicts = 4;
}

// A conflict on a specific property of a shape.
message PropertyConflict {
  // Name of the property (e.g., "x", "width", "fills").
  string property_name = 1;
  // Value in the common ancestor (base).
  string base_value = 2;
  // Value in the source branch (theirs).
  string source_value = 3;
  // Value in the target branch (ours).
  string target_value = 4;
}

// Resolution for a single property conflict.
message ConflictResolution {
  // ID of the shape.
  string shape_id = 1;
  // Name of the property being resolved.
  string property_name = 2;
  // Which version to use.
  ResolutionChoice choice = 3;
  // Custom value (only used if choice is CUSTOM).
  optional string custom_value = 4;
}

// How to resolve a conflict.
enum ResolutionChoice {
  // Default/unspecified.
  RESOLUTION_CHOICE_UNSPECIFIED = 0;
  // Use the value from source branch (incoming changes).
  RESOLUTION_CHOICE_SOURCE = 1;
  // Keep the value from target branch (existing).
  RESOLUTION_CHOICE_TARGET = 2;
  // Use a custom value provided by the user.
  RESOLUTION_CHOICE_CUSTOM = 3;
}

// =============================================================================
// Shape-Specific Properties
// =============================================================================

// Properties specific to rectangle shapes.
//
// Corner radii are applied in CSS order: top-left, top-right, bottom-right, bottom-left.
// All radii default to 0 (sharp corners).
message RectangleProperties {
  // Top-left corner radius in canvas units.
  double r1 = 1;
  // Top-right corner radius in canvas units.
  double r2 = 2;
  // Bottom-right corner radius in canvas units.
  double r3 = 3;
  // Bottom-left corner radius in canvas units.
  double r4 = 4;
}

// Properties specific to text shapes.
//
// Contains all typography settings for text rendering.
message TextProperties {
  // The text content to display.
  string text = 1;
  // Font size in canvas units (pixels at 100% zoom).
  double font_size = 2;
  // Font family name (e.g., "Inter", "Roboto").
  // If not available, system default is used.
  optional string font_family = 3;
  // Font weight as numeric value (100-900).
  // 400 = normal, 700 = bold.
  optional int32 font_weight = 4;
  // Text horizontal alignment within the text box.
  TextAlign text_align = 5;
  // Line height multiplier (1.0 = single spacing, 1.5 = 150%).
  double line_height = 6;
  // Letter spacing as percentage of font size.
  double letter_spacing_percent = 7;
}

// Text horizontal alignment options.
enum TextAlign {
  // Default/unspecified - treated as LEFT.
  TEXT_ALIGN_UNSPECIFIED = 0;
  // Align text to the left edge.
  TEXT_ALIGN_LEFT = 1;
  // Center text horizontally.
  TEXT_ALIGN_CENTER = 2;
  // Align text to the right edge.
  TEXT_ALIGN_RIGHT = 3;
  // Justify text (stretch to fill width).
  TEXT_ALIGN_JUSTIFY = 4;
}

// Properties specific to frame shapes (artboards).
//
// Frames are containers that can clip content and have auto-layout.
message FrameProperties {
  // Whether content outside frame bounds is clipped/hidden.
  bool clip_content = 1;
  // Background color (if different from fills).
  optional uint32 background_color = 2;
}

// Properties specific to path shapes (vector graphics).
//
// Paths are defined by a series of path commands (move, line, curve, close).
message PathProperties {
  // SVG-like path data string (e.g., "M 0 0 L 100 100 Z").
  string path_data = 1;
  // Whether the path is closed (end connects to start).
  bool closed = 2;
}

// Properties specific to image shapes.
message ImageProperties {
  // Reference ID to the uploaded image asset.
  string asset_id = 1;
  // Original image width in pixels.
  double original_width = 2;
  // Original image height in pixels.
  double original_height = 3;
  // How the image is scaled within its bounds.
  ImageScaleMode scale_mode = 4;
}

// Image scaling mode within shape bounds.
enum ImageScaleMode {
  // Default/unspecified - treated as FILL.
  IMAGE_SCALE_MODE_UNSPECIFIED = 0;
  // Scale to fill bounds, cropping if necessary.
  IMAGE_SCALE_MODE_FILL = 1;
  // Scale to fit entirely within bounds, letterboxing if necessary.
  IMAGE_SCALE_MODE_FIT = 2;
  // Stretch to exactly match bounds (may distort).
  IMAGE_SCALE_MODE_STRETCH = 3;
  // Display at original size, cropping if larger than bounds.
  IMAGE_SCALE_MODE_ORIGINAL = 4;
}

// Properties specific to boolean operation shapes.
message BoolProperties {
  // Type of boolean operation.
  BoolOperation operation = 1;
  // IDs of shapes involved in the boolean operation.
  repeated string source_shape_ids = 2;
}

// Boolean operation types.
enum BoolOperation {
  // Default/unspecified.
  BOOL_OPERATION_UNSPECIFIED = 0;
  // Union: combine all shapes.
  BOOL_OPERATION_UNION = 1;
  // Subtract: remove second shape from first.
  BOOL_OPERATION_SUBTRACT = 2;
  // Intersect: keep only overlapping areas.
  BOOL_OPERATION_INTERSECT = 3;
  // Exclude: keep non-overlapping areas (XOR).
  BOOL_OPERATION_EXCLUDE = 4;
}
