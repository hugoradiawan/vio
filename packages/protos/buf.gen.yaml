version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/vio/protos/gen/go
clean: true
plugins:
  # Protobuf ES messages + service descriptors (@bufbuild/protobuf v2)
  # In ConnectRPC v2, protoc-gen-connect-es is no longer needed - service
  # descriptors are generated by protoc-gen-es directly
  - local: protoc-gen-es
    out: ../../backend/src/gen
    include_imports: true
    opt:
      - target=ts
      - import_extension=.js
  # Dart protobuf + gRPC generation (Flutter client uses gRPC-Web, which ConnectRPC supports)
  - local: protoc-gen-dart
    out: ../../apps/client/lib/src/gen
    opt:
      - grpc
