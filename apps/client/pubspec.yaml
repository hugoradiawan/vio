name: vio_client
description: Vio Design Tool - Flutter Client Application
version: 0.1.0+1
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.38.5"

dependencies:
  flutter:
    sdk: flutter

  # Internal packages
  vio_core:
  vio_ui_kit:

  # State Management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  hydrated_bloc: ^10.1.1

  # Routing
  go_router: ^17.0.1

  # Utilities
  equatable: ^2.0.8
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.3.3

  # Storage
  shared_preferences: ^2.5.4

  # HTTP Client
  dio: ^5.8.0

  # Platform
  path_provider: ^2.1.5
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.0  # Required by protobuf generated code for Int64
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  flutter_secure_storage: ^10.0.0
  rust_lib_vio_client:
    path: rust_builder
  flutter_rust_bridge: 2.11.1
  freezed_annotation: ^3.1.0

  collection: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.11.1

flutter:
  uses-material-design: true
