name: vio_client
description: Vio Design Tool - Flutter Client Application
version: 0.1.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Internal packages
  vio_core:
    path: ../../packages/core
  vio_ui_kit:
    path: ../../packages/ui_kit

  # State Management
  flutter_bloc: ^8.1.6
  bloc_concurrency: ^0.2.5
  hydrated_bloc: ^9.1.5
  replay_bloc: ^0.2.7

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Routing
  go_router: ^14.6.2

  # Utilities
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.3

  # Platform
  window_manager: ^0.4.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
