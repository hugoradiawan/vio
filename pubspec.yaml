name: vio_workspace
description: Vio Design Tool - Monorepo workspace root
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

workspace:
  - apps/client
  - packages/core
  - packages/ui_kit

dev_dependencies:
  melos: ^7.3.0

melos:
  sdkPath: .fvm/flutter_sdk
  discoverNestedWorkspaces: true
  repository: https://github.com/user/vio

  ide:
    intellij:
      enabled: true

  bootstrap:
    runPubGetInParallel: true

  scripts:
    # Analysis & Formatting
    analyze:
      run: melos exec -- "dart analyze ."
      description: Run static analysis on all packages

    format:
      run: melos exec -- "dart format ."
      description: Format all Dart files

    format:check:
      run: melos exec -- "dart format --set-exit-if-changed ."
      description: Check formatting without changes

    # Testing
    test:
      run: melos exec -- "flutter test"
      packageFilters:
        dirExists: test
      description: Run tests in all packages

    test:coverage:
      run: melos exec -- "flutter test --coverage"
      packageFilters:
        dirExists: test
      description: Run tests with coverage

    # Code Generation
    build:runner:
      run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
      packageFilters:
        dependsOn: build_runner
      description: Run build_runner in packages that need it

    build:runner:watch:
      run: melos exec -- "dart run build_runner watch --delete-conflicting-outputs"
      packageFilters:
        dependsOn: build_runner
      description: Watch mode for build_runner

    # Protobuf Generation
    proto:generate:
      run: bun run scripts/proto-generate.ts
      description: Generate Dart + TypeScript code from proto files

    # Clean
    clean:
      run: melos exec -- "flutter clean"
      description: Clean all packages

    clean:deep:
      run: |
        melos clean
        melos exec -- "rm -rf .dart_tool build pubspec.lock"
      description: Deep clean including lock files

    # Run apps
    run:client:web:
      run: cd apps/client && fvm flutter run -d chrome --dart-define-from-file=config/dev.json
      description: Run client app on web (dev)

    run:client:web:staging:
      run: cd apps/client && fvm flutter run -d chrome --dart-define-from-file=config/staging.json
      description: Run client app on web (staging)

    run:client:web:prod:
      run: cd apps/client && fvm flutter run -d chrome --dart-define-from-file=config/production.json
      description: Run client app on web (production)

    run:client:windows:
      run: cd apps/client && fvm flutter run -d windows --dart-define-from-file=config/dev.json
      description: Run client app on Windows (dev)

    run:client:windows:prod:
      run: cd apps/client && fvm flutter run -d windows --dart-define-from-file=config/production.json
      description: Run client app on Windows (production)

    run:client:macos:
      run: cd apps/client && fvm flutter run -d macos --dart-define-from-file=config/dev.json
      description: Run client app on macOS (dev)

    # Rust engine scripts
    rust:test:
      run: cd apps/client/rust && cargo test
      description: Run Rust unit tests

    rust:test:verbose:
      run: cd apps/client/rust && cargo test -- --nocapture
      description: Run Rust tests with stdout output

    rust:bench:
      run: cd apps/client/rust && cargo bench
      description: Run Rust benchmarks

    rust:clippy:
      run: cd apps/client/rust && cargo clippy -- -D warnings
      description: Run Rust linter (clippy)

    rust:generate:
      run: cd apps/client && flutter_rust_bridge_codegen generate --dump config --stop-on-error --no-auto-upgrade-dependency
      description: Generate Dart bindings from Rust API

    rust:build:wasm:
      run: cd apps/client && bash tool/build_wasm.sh
      description: Build Rust crate for WASM (web) — compiles + wasm-bindgen
dependencies:
  flutter_rust_bridge: ^2.11.1
