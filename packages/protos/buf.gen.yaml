version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/vio/protos/gen/go
plugins:
  # ts-proto for native gRPC with nice-grpc
  - local: protoc-gen-ts_proto
    out: ../../backend/src/gen
    opt:
      - outputServices=nice-grpc
      - outputServices=generic-definitions
      - esModuleInterop=true
      - useExactTypes=false
      - snakeToCamel=true
      - forceLong=bigint
      - oneof=unions
      - outputPartialMethods=false
      - outputClientImpl=false
      - importSuffix=.js
