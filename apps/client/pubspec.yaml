name: vio_client
description: Vio Design Tool - Flutter Client Application
version: 0.1.0+1
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.38.5"

dependencies:
  flutter:
    sdk: flutter

  # Internal packages
  vio_core:
  vio_ui_kit:

  # State Management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  hydrated_bloc: ^10.1.1
  replay_bloc: ^0.3.0

  # Routing
  go_router: ^17.0.1

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.3.3

  # Storage
  shared_preferences: ^2.5.4

  # Platform
  window_manager: ^0.5.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
